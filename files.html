<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichiers - Univers</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav class="navbar">
        <div class="navbar-container">
            <a href="dashboard.html" class="navbar-brand">Univers</a>
            <div class="nav-links">
                <a href="dashboard.html">Accueil</a>
                <a href="files.html">Fichiers</a>
                <a href="profile.html">Profil</a>
                <a href="#" onclick="handleLogout()" class="btn btn-secondary">Déconnexion</a>
            </div>
        </div>
    </nav>

    <div style="max-width: 1400px; margin: 0 auto; padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Tous les fichiers</h1>
            <div style="display: flex; gap: 1rem;">
                <input type="text" id="searchInput" placeholder="Rechercher..." style="padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                <select id="categoryFilter" style="padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                    <option value="all">Toutes les catégories</option>
                    <option value="logiciels">Logiciels</option>
                    <option value="jeux">Jeux</option>
                    <option value="documents">Documents</option>
                </select>
            </div>
        </div>
        <div class="card-grid" id="files-grid">
            <!-- Fichiers chargés dynamiquement -->
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/files.js"></script>
</body>
</html>
